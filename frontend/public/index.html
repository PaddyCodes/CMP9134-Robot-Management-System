<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GCS — Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
      color: #0a2342;
    }

    header {
      background: #0a2342;
      color: white;
      padding: 0.75rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 1.1rem;
      letter-spacing: 2px;
    }

    .conn-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }

    .conn-indicator.ok {
      background: #26a69a;
    }

    .conn-indicator.error {
      background: #c62828;
    }

    /* ── Login overlay ──────────────────────────────────────────────────── */
    /*
     * The login overlay sits on top of the entire page until the user
     * authenticates.  Once a valid JWT is returned from POST /token the
     * overlay is hidden and the dashboard becomes visible.
     *
     * z-index: 100 ensures it covers the header and all dashboard content.
     */
    #login-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(10, 35, 66, 0.92); /* dark navy with slight transparency */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #login-overlay.hidden {
      display: none;
    }

    .login-card {
      background: white;
      border-radius: 10px;
      padding: 2rem 2.4rem;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .login-card h2 {
      font-size: 1rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #0a2342;
      margin-bottom: 0.25rem;
    }

    .login-card .login-subtitle {
      font-size: 0.72rem;
      color: #5a6a85;
      margin-bottom: 1.4rem;
    }

    .login-card label {
      display: block;
      font-size: 0.72rem;
      text-transform: uppercase;
      color: #5a6a85;
      margin-bottom: 0.3rem;
      margin-top: 0.8rem;
    }

    .login-card input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid #d0d7e3;
      border-radius: 6px;
      font-size: 0.9rem;
      color: #0a2342;
      outline: none;
      transition: border-color 0.15s;
    }

    .login-card input:focus {
      border-color: #26a69a;
    }

    .login-btn {
      margin-top: 1.2rem;
      width: 100%;
      padding: 0.6rem;
      background: #0a2342;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .login-btn:hover {
      background: #163a6b;
    }

    .login-btn:disabled {
      background: #8a96a8;
      cursor: not-allowed;
    }

    /* Error message shown below the button on failed login */
    #login-error {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      color: #c62828;
      text-align: center;
      min-height: 1rem; /* reserves space so layout does not jump */
    }

    /* ── User badge shown in header after login ─────────────────────────── */
    #user-badge {
      font-size: 0.75rem;
      color: #ccc;
      margin-right: 0.75rem;
      display: none; /* hidden until login succeeds */
    }

    #user-badge span {
      color: #26a69a;
      font-weight: 600;
    }

    /* ── Status cards ───────────────────────────────────────────────────── */
    main {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      padding: 1rem;
    }

    .stat-card {
      background: white;
      border-radius: 8px;
      padding: 1rem 1.2rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
      text-align: center;
    }

    .stat-card .label {
      font-size: .72rem;
      color: #5a6a85;
      text-transform: uppercase;
    }

    .stat-card .value {
      font-size: 1.6rem;
      font-weight: 700;
      margin-top: 6px;
    }

    .stat-card.warn .value {
      color: #e8a020;
    }

    .stat-card.danger .value {
      color: #c62828;
    }

    /* ── Map section ────────────────────────────────────────────────────── */
    .map-section {
      margin: 0 1rem 1.5rem;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
      padding: 1rem 1.2rem;
    }

    .map-section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .map-section-header h2 {
      font-size: 0.72rem;
      text-transform: uppercase;
      color: #5a6a85;
      letter-spacing: 1px;
    }

    .map-badge {
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .map-badge.loading {
      background: #e8f4ff;
      color: #1565c0;
    }

    .map-badge.error {
      background: #fdecea;
      color: #c62828;
    }

    .map-badge.ok {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .map-wrapper {
      display: flex;
      justify-content: center;
    }

    /*
     * The grid itself: CSS Grid with 21 equal columns.
     * --cols is set to 21 via JS to keep it DRY.
     * Each cell is a fixed 24 px square so the full grid is 504 px wide,
     * which fits comfortably on any laptop screen.
     */
    .robot-grid {
      display: grid;
      grid-template-columns: repeat(var(--cols, 21), 24px);
      grid-template-rows: repeat(var(--rows, 21), 24px);
      gap: 1px;
      background: #d0d7e3;
      border: 1px solid #d0d7e3;
      border-radius: 4px;
      overflow: hidden;
    }

    /* ── Individual cell states ─────────────────────────────────────────── */
    .cell {
      width: 24px;
      height: 24px;
      position: relative;
      transition: background 0.15s ease;
    }

    .cell.empty    { background: #f8fafc; }
    .cell.obstacle { background: #1a2a45; }
    .cell.robot    { background: #0a2342; }

    .cell.robot::after {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: #26a69a;
      box-shadow: 0 0 6px rgba(38, 166, 154, 0.8);
    }

    .map-axis {
      display: flex;
      justify-content: center;
      margin-top: 4px;
      font-size: 0.6rem;
      color: #8a96a8;
      letter-spacing: 0.5px;
    }

    .map-legend {
      display: flex;
      gap: 1rem;
      margin-top: 0.6rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.68rem;
      color: #5a6a85;
    }

    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .legend-swatch.empty    { background: #f8fafc; border: 1px solid #d0d7e3; }
    .legend-swatch.obstacle { background: #1a2a45; }
    .legend-swatch.robot    { background: #0a2342; border-radius: 50%; }
  </style>
</head>

<body>

  <!-- ── Login overlay ────────────────────────────────────────────────────
       Shown on page load.  Hidden by hideLoginOverlay() once a valid JWT
       is returned from POST /token.
  ──────────────────────────────────────────────────────────────────────── -->
  <div id="login-overlay">
    <div class="login-card">
      <h2>⚙ Ground Control Station</h2>
      <p class="login-subtitle">Sign in to access the dashboard</p>

      <label for="username">Username</label>
      <input type="text" id="username" placeholder="commander" autocomplete="username" />

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />

      <button class="login-btn" id="login-btn" onclick="handleLogin()">Sign In</button>
      <div id="login-error"></div>
    </div>
  </div>

  <!-- ── Header ───────────────────────────────────────────────────────── -->
  <header>
    <h1>⚙ GROUND CONTROL STATION</h1>
    <div style="display:flex;align-items:center;">
      <!-- User badge: hidden until login; shows username and role -->
      <span id="user-badge"></span>
      <span id="conn-dot" class="conn-indicator error"></span>
      <span id="conn-label" style="font-size:.8rem;color:#ccc">Connecting…</span>
    </div>
  </header>

  <!-- ── Status cards ──────────────────────────────────────────────────── -->
  <main>
    <div class="stat-card" id="card-pos">
      <div class="label">Position</div>
      <div class="value" id="pos">—</div>
    </div>
    <div class="stat-card" id="card-battery">
      <div class="label">Battery</div>
      <div class="value" id="battery">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Status</div>
      <div class="value" style="font-size:1.1rem" id="robot-status">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Robot ID</div>
      <div class="value" style="font-size:1rem" id="robot-id">—</div>
    </div>
  </main>

  <!-- ── Map / grid section ─────────────────────────────────────────────── -->
  <section class="map-section">
    <div class="map-section-header">
      <h2>Environment Map</h2>
      <span id="map-badge" class="map-badge loading">Loading…</span>
    </div>

    <div class="map-wrapper">
      <div class="robot-grid" id="robot-grid"></div>
    </div>

    <div class="map-axis" id="map-axis"></div>

    <div class="map-legend">
      <span class="legend-item">
        <span class="legend-swatch empty"></span> Empty
      </span>
      <span class="legend-item">
        <span class="legend-swatch obstacle"></span> Obstacle
      </span>
      <span class="legend-item">
        <span class="legend-swatch robot"></span> Robot
      </span>
    </div>
  </section>

  <script>
    const $ = id => document.getElementById(id);

    // ── Authentication state ───────────────────────────────────────────────
    //
    // The JWT is stored in a plain JavaScript variable (in-memory only).
    // This is intentional for this coursework: storing a token in
    // localStorage or a cookie would require additional security measures
    // (e.g. HttpOnly cookies, CSRF protection) that are out of scope here.
    // The trade-off is that the token is lost on page refresh, requiring
    // the user to log in again — acceptable for a coursework prototype.
    let accessToken = null;

    // ── Authenticated fetch helper ─────────────────────────────────────────
    //
    // All requests to protected backend endpoints must include the JWT in
    // the Authorization header as a Bearer token.  This helper wraps the
    // native fetch() call and injects the header automatically, so every
    // polling function benefits without repeating the header logic.
    //
    //   Authorization: Bearer <token>
    function authFetch(url, options = {}) {
      return fetch(url, {
        ...options,
        headers: {
          ...(options.headers || {}),
          'Authorization': `Bearer ${accessToken}`,
        },
      });
    }

    // ── Login handler ──────────────────────────────────────────────────────
    //
    // POST /token expects application/x-www-form-urlencoded (the OAuth2
    // Password flow standard), NOT JSON.  URLSearchParams automatically
    // encodes the body in the correct format.
    async function handleLogin() {
      const btn      = $('login-btn');
      const errorEl  = $('login-error');
      const username = $('username').value.trim();
      const password = $('password').value;

      // Basic client-side guard — the server will also validate
      if (!username || !password) {
        errorEl.textContent = 'Please enter a username and password.';
        return;
      }

      // Disable the button while the request is in flight to prevent
      // duplicate submissions if the user clicks quickly
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      errorEl.textContent = '';

      try {
        // Step 1: Exchange credentials for a JWT
        // Content-Type is set implicitly by URLSearchParams to
        // application/x-www-form-urlencoded — do not override it manually
        const res = await fetch('/token', {
          method: 'POST',
          body: new URLSearchParams({ username, password }),
        });

        if (!res.ok) {
          // 401 Unauthorized = wrong credentials
          const data = await res.json().catch(() => ({}));
          throw new Error(data.detail || 'Login failed. Check your credentials.');
        }

        const data = await res.json();

        // Step 2: Store the token in memory for all subsequent requests
        accessToken = data.access_token;

        // Step 3: Fetch the user's profile to display role in the header
        // GET /api/me is a protected endpoint — authFetch adds the Bearer header
        const meRes = await authFetch('/api/me');
        if (meRes.ok) {
          const me = await meRes.json();
          // Show username and role in the header, then hide the login overlay
          $('user-badge').innerHTML =
            `<span>${me.username}</span>&nbsp;(${me.role})&nbsp;·&nbsp;`;
          $('user-badge').style.display = 'inline';
        }

        // Step 4: Hide the overlay and start the dashboard polling loops
        $('login-overlay').classList.add('hidden');
        startDashboard();

      } catch (err) {
        // Show the error message below the login button
        errorEl.textContent = err.message;
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    // Allow pressing Enter in the password field to submit the form
    $('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });

    // ── Dashboard polling ──────────────────────────────────────────────────
    //
    // startDashboard() is called once after a successful login.
    // It runs the first poll immediately and then schedules repeating
    // intervals — the same timing as before (status: 3 s, map: 10 s).

    // ── State ─────────────────────────────────────────────────────────────
    let robotPos = null;  // { x, y } or null if not yet known
    let mapGrid  = null;  // 2-D array from /api/map, or null

    // ── Status polling ─────────────────────────────────────────────────────
    async function pollStatus() {
      try {
        // authFetch injects Authorization: Bearer <token> automatically
        const r = await authFetch('/api/status');
        if (!r.ok) throw new Error(r.statusText);
        const d = await r.json();

        $('conn-dot').className = 'conn-indicator ok';
        $('conn-label').textContent = 'Connected';

        $('robot-id').textContent = d.id ?? '—';
        $('pos').textContent = d.position ? `(${d.position.x}, ${d.position.y})` : '—';
        $('robot-status').textContent = d.status ?? '—';

        if (d.battery !== undefined) {
          $('battery').textContent = `${d.battery.toFixed(1)}%`;
          const card = $('card-battery');
          card.className = 'stat-card' + (d.battery < 20 ? ' danger' : d.battery < 40 ? ' warn' : '');
        }

        // Update robot position and re-render the map overlay if we already
        // have map data.  This keeps the dot moving without re-fetching the
        // whole map on every status poll.
        if (d.position) {
          robotPos = { x: d.position.x, y: d.position.y };
          if (mapGrid) renderMap(mapGrid);
        }

      } catch {
        $('conn-dot').className = 'conn-indicator error';
        $('conn-label').textContent = 'Unreachable';
      }
    }

    // ── Map fetch ──────────────────────────────────────────────────────────
    async function fetchMap() {
      const badge = $('map-badge');
      try {
        // authFetch injects Authorization: Bearer <token> automatically
        const r = await authFetch('/api/map');
        if (!r.ok) throw new Error(r.statusText);
        const data = await r.json();

        /*
         * The simulator returns the map in a "grid" field.
         * Each element is a row (array of integers):
         *   0 = empty traversable cell
         *   1 = obstacle / wall
         */
        const grid = data.grid ?? null;
        if (!Array.isArray(grid)) throw new Error('Unexpected map format');

        mapGrid = grid;
        badge.className   = 'map-badge ok';
        badge.textContent = `${grid.length}×${grid[0].length}`;
        renderMap(grid);

      } catch (err) {
        badge.className   = 'map-badge error';
        badge.textContent = 'Map unavailable';
        console.warn('Map fetch failed:', err);
      }
    }

    // ── Grid builder — called once when map data first arrives ─────────────
    //
    // We build the full set of <div> cells once and store references to them
    // in a flat array (`cellEls`).  Subsequent re-renders only swap CSS
    // classes rather than rebuilding the DOM — this keeps updates fast and
    // avoids layout thrashing when the status poll fires every 3 s.
    const cellEls = [];  // flat array: cellEls[row * cols + col]

    function buildGrid(rows, cols) {
      const grid = $('robot-grid');
      grid.innerHTML = '';
      cellEls.length = 0;

      grid.style.setProperty('--cols', cols);
      grid.style.setProperty('--rows', rows);

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.dataset.row = row;
          cell.dataset.col = col;
          grid.appendChild(cell);
          cellEls.push(cell);
        }
      }

      $('map-axis').textContent = `X: 0 → ${cols - 1}   |   Y: 0 → ${rows - 1}`;
    }

    // ── Map renderer — called on every map fetch AND every status poll ─────
    //
    // The map API returns rows in row-major order where row 0 is y=0.
    // We iterate top-to-bottom so CSS Grid's natural left-to-right,
    // top-to-bottom flow matches the coordinate system without transforms.
    function renderMap(grid) {
      const rows = grid.length;
      const cols = grid[0].length;

      if (cellEls.length !== rows * cols) {
        buildGrid(rows, cols);
      }

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const cell  = cellEls[row * cols + col];
          const value = grid[row][col];

          // robotPos.x maps to column index; robotPos.y maps to row index
          const isRobot = robotPos && robotPos.x === col && robotPos.y === row;

          if (isRobot) {
            cell.className = 'cell robot';
          } else if (value === 1) {
            cell.className = 'cell obstacle';
          } else {
            cell.className = 'cell empty';
          }

          cell.title = isRobot
            ? `Robot at (${col}, ${row})`
            : value === 1
              ? `Obstacle at (${col}, ${row})`
              : `Empty cell at (${col}, ${row})`;
        }
      }
    }

    // ── Dashboard startup — called once after successful login ─────────────
    function startDashboard() {
      pollStatus();
      fetchMap();
      setInterval(pollStatus, 3000);
      setInterval(fetchMap, 10000);
    }
  </script>

</body>

</html>
