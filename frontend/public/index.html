<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GCS — Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
      color: #0a2342;
    }

    header {
      background: #0a2342;
      color: white;
      padding: 0.75rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 1.1rem;
      letter-spacing: 2px;
    }

    .conn-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }

    .conn-indicator.ok    { background: #26a69a; }
    .conn-indicator.error { background: #c62828; }

    /* ── Login overlay ──────────────────────────────────────────────────── */
    #login-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(10, 35, 66, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #login-overlay.hidden { display: none; }

    .login-card {
      background: white;
      border-radius: 10px;
      padding: 2rem 2.4rem;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .login-card h2 {
      font-size: 1rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #0a2342;
      margin-bottom: 0.25rem;
    }

    .login-card .login-subtitle {
      font-size: 0.72rem;
      color: #5a6a85;
      margin-bottom: 1.4rem;
    }

    .login-card label {
      display: block;
      font-size: 0.72rem;
      text-transform: uppercase;
      color: #5a6a85;
      margin-bottom: 0.3rem;
      margin-top: 0.8rem;
    }

    .login-card input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid #d0d7e3;
      border-radius: 6px;
      font-size: 0.9rem;
      color: #0a2342;
      outline: none;
      transition: border-color 0.15s;
    }

    .login-card input:focus { border-color: #26a69a; }

    .login-btn {
      margin-top: 1.2rem;
      width: 100%;
      padding: 0.6rem;
      background: #0a2342;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .login-btn:hover    { background: #163a6b; }
    .login-btn:disabled { background: #8a96a8; cursor: not-allowed; }

    #login-error {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      color: #c62828;
      text-align: center;
      min-height: 1rem;
    }

    /* ── User badge ─────────────────────────────────────────────────────── */
    #user-badge {
      font-size: 0.75rem;
      color: #ccc;
      margin-right: 0.75rem;
      display: none;
    }

    #user-badge span { color: #26a69a; font-weight: 600; }

    /* ── Status cards ───────────────────────────────────────────────────── */
    main {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      padding: 1rem;
    }

    .stat-card {
      background: white;
      border-radius: 8px;
      padding: 1rem 1.2rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
      text-align: center;
    }

    .stat-card .label {
      font-size: .72rem;
      color: #5a6a85;
      text-transform: uppercase;
    }

    .stat-card .value {
      font-size: 1.6rem;
      font-weight: 700;
      margin-top: 6px;
    }

    .stat-card.warn .value   { color: #e8a020; }
    .stat-card.danger .value { color: #c62828; }

    /* ── Shared section wrapper ─────────────────────────────────────────── */
    /* Both the controls panel and the map card share this base style so   */
    /* they look visually consistent without duplicating CSS.               */
    .dashboard-section {
      margin: 0 1rem 1.5rem;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
      padding: 1rem 1.2rem;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .section-header h2 {
      font-size: 0.72rem;
      text-transform: uppercase;
      color: #5a6a85;
      letter-spacing: 1px;
    }

    /* ── Robot Controls panel ───────────────────────────────────────────── */
    /*
     * The controls are laid out as a 3-column CSS Grid so the directional
     * buttons sit in a compass-rose arrangement:
     *
     *   [ empty ] [  Up  ] [ empty ]
     *   [  Left ] [ Reset] [ Right ]
     *   [ empty ] [ Down ] [ empty ]
     *
     * The Reset button occupies the centre cell and uses a distinct colour
     * to distinguish it from the directional commands.
     */
    .controls-grid {
      display: grid;
      grid-template-columns: repeat(3, 56px);
      grid-template-rows: repeat(3, 56px);
      gap: 6px;
      justify-content: center;
    }

    /* Base style shared by all control buttons */
    .ctrl-btn {
      width: 56px;
      height: 56px;
      border: none;
      border-radius: 8px;
      font-size: 1.3rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    /* Directional buttons — dark navy, matching the header */
    .ctrl-btn.dir {
      background: #0a2342;
    }

    .ctrl-btn.dir:hover:not(:disabled) { background: #163a6b; }

    /* Reset button — teal accent to visually separate it from move commands */
    .ctrl-btn.reset-btn {
      background: #1a7a72;
      font-size: 0.65rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-weight: 700;
    }

    .ctrl-btn.reset-btn:hover:not(:disabled) { background: #26a69a; }

    /* Disabled state used while a request is in-flight */
    .ctrl-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Invisible placeholder cell — fills the four corner grid positions */
    .ctrl-empty { width: 56px; height: 56px; }

    /* Status line below the buttons — shows last command result */
    #ctrl-status {
      margin-top: 0.75rem;
      font-size: 0.72rem;
      text-align: center;
      min-height: 1rem;
      color: #5a6a85;
    }

    #ctrl-status.ok    { color: #2e7d32; }
    #ctrl-status.error { color: #c62828; }

    /* ── Map section ────────────────────────────────────────────────────── */
    .map-badge {
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .map-badge.loading { background: #e8f4ff; color: #1565c0; }
    .map-badge.error   { background: #fdecea; color: #c62828; }
    .map-badge.ok      { background: #e8f5e9; color: #2e7d32; }

    .map-wrapper { display: flex; justify-content: center; }

    .robot-grid {
      display: grid;
      grid-template-columns: repeat(var(--cols, 21), 24px);
      grid-template-rows: repeat(var(--rows, 21), 24px);
      gap: 1px;
      background: #d0d7e3;
      border: 1px solid #d0d7e3;
      border-radius: 4px;
      overflow: hidden;
    }

    /* ── Individual cell states ─────────────────────────────────────────── */
    .cell {
      width: 24px;
      height: 24px;
      position: relative;
      transition: background 0.15s ease;
    }

    .cell.empty    { background: #f8fafc; }
    .cell.obstacle { background: #1a2a45; }
    .cell.robot    { background: #0a2342; }

    .cell.robot::after {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: #26a69a;
      box-shadow: 0 0 6px rgba(38, 166, 154, 0.8);
    }

    .map-axis {
      display: flex;
      justify-content: center;
      margin-top: 4px;
      font-size: 0.6rem;
      color: #8a96a8;
      letter-spacing: 0.5px;
    }

    .map-legend {
      display: flex;
      gap: 1rem;
      margin-top: 0.6rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.68rem;
      color: #5a6a85;
    }

    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .legend-swatch.empty    { background: #f8fafc; border: 1px solid #d0d7e3; }
    .legend-swatch.obstacle { background: #1a2a45; }
    .legend-swatch.robot    { background: #0a2342; border-radius: 50%; }
  </style>
</head>

<body>

  <!-- ── Login overlay ────────────────────────────────────────────────────
       Shown on page load.  Hidden once a valid JWT is returned from POST /token.
  ──────────────────────────────────────────────────────────────────────── -->
  <div id="login-overlay">
    <div class="login-card">
      <h2>⚙ Ground Control Station</h2>
      <p class="login-subtitle">Sign in to access the dashboard</p>

      <label for="username">Username</label>
      <input type="text" id="username" placeholder="commander" autocomplete="username" />

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />

      <button class="login-btn" id="login-btn" onclick="handleLogin()">Sign In</button>
      <div id="login-error"></div>
    </div>
  </div>

  <!-- ── Header ───────────────────────────────────────────────────────── -->
  <header>
    <h1>⚙ GROUND CONTROL STATION</h1>
    <div style="display:flex;align-items:center;">
      <span id="user-badge"></span>
      <span id="conn-dot" class="conn-indicator error"></span>
      <span id="conn-label" style="font-size:.8rem;color:#ccc">Connecting…</span>
    </div>
  </header>

  <!-- ── Status cards ──────────────────────────────────────────────────── -->
  <main>
    <div class="stat-card" id="card-pos">
      <div class="label">Position</div>
      <div class="value" id="pos">—</div>
    </div>
    <div class="stat-card" id="card-battery">
      <div class="label">Battery</div>
      <div class="value" id="battery">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Status</div>
      <div class="value" style="font-size:1.1rem" id="robot-status">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Robot ID</div>
      <div class="value" style="font-size:1rem" id="robot-id">—</div>
    </div>
  </main>

  <!-- ── Robot Controls ────────────────────────────────────────────────────
       Only Commanders can use these — Viewers will receive a 403 from the
       backend if they somehow trigger a request, and the status line will
       display the rejection message.  Full role-hiding (removing buttons for
       Viewers) can be added once RBAC is wired into /api/me response.
  ──────────────────────────────────────────────────────────────────────── -->
  <section class="dashboard-section">
    <div class="section-header">
      <h2>Robot Controls</h2>
      <span id="ctrl-role-badge" style="font-size:0.68rem;color:#5a6a85;"></span>
    </div>

    <!--
      Compass-rose layout (3×3 CSS Grid):
        col1        col2        col3
      [ empty ]  [  ▲ Up  ]  [ empty ]   row 1
      [ ◄ Left]  [ Reset  ]  [Right ► ]  row 2
      [ empty ]  [  ▼ Down]  [ empty ]   row 3
    -->
    <div class="controls-grid">
      <!-- Row 1 -->
      <span class="ctrl-empty"></span>
      <button class="ctrl-btn dir" id="btn-up"    onclick="move(0, -1)"  title="Move Up (y − 1)">▲</button>
      <span class="ctrl-empty"></span>

      <!-- Row 2 -->
      <button class="ctrl-btn dir"       id="btn-left"  onclick="move(-1, 0)"  title="Move Left (x − 1)">◄</button>
      <button class="ctrl-btn reset-btn" id="btn-reset" onclick="resetRobot()" title="Reset to home position">RST</button>
      <button class="ctrl-btn dir"       id="btn-right" onclick="move(1, 0)"   title="Move Right (x + 1)">►</button>

      <!-- Row 3 -->
      <span class="ctrl-empty"></span>
      <button class="ctrl-btn dir" id="btn-down"  onclick="move(0, 1)"   title="Move Down (y + 1)">▼</button>
      <span class="ctrl-empty"></span>
    </div>

    <!-- Last command result — updated after every move / reset attempt -->
    <div id="ctrl-status"></div>
  </section>

  <!-- ── Map / grid section ─────────────────────────────────────────────── -->
  <section class="dashboard-section">
    <div class="section-header">
      <h2>Environment Map</h2>
      <span id="map-badge" class="map-badge loading">Loading…</span>
    </div>

    <div class="map-wrapper">
      <!--
        The grid cells are injected here by buildGrid() / renderMap().
        CSS Grid columns/rows are set via CSS custom properties --cols / --rows
        so the layout automatically matches whatever dimensions the API returns.
      -->
      <div class="robot-grid" id="robot-grid"></div>
    </div>

    <div class="map-axis" id="map-axis"></div>

    <div class="map-legend">
      <span class="legend-item"><span class="legend-swatch empty"></span> Empty</span>
      <span class="legend-item"><span class="legend-swatch obstacle"></span> Obstacle</span>
      <span class="legend-item"><span class="legend-swatch robot"></span> Robot</span>
    </div>
  </section>

  <script>
    const $ = id => document.getElementById(id);

    // ── Authentication state ───────────────────────────────────────────────
    //
    // JWT stored in memory for simplicity during development.
    // Token is cleared on page refresh, requiring re-authentication.
    let accessToken = null;

    // ── Authenticated fetch helper ─────────────────────────────────────────
    //
    // All requests to protected backend endpoints must include the JWT in
    // the Authorization header as a Bearer token.  This helper wraps the
    // native fetch() call and injects the header automatically, so every
    // polling function and command function benefits without repeating the
    // header logic.
    //
    // Authorization header using Bearer token authentication
    function authFetch(url, options = {}) {
      return fetch(url, {
        ...options,
        headers: {
          ...(options.headers || {}),
          'Authorization': `Bearer ${accessToken}`,
        },
      });
    }

    // ── Login handler ──────────────────────────────────────────────────────
    async function handleLogin() {
      const btn      = $('login-btn');
      const errorEl  = $('login-error');
      const username = $('username').value.trim();
      const password = $('password').value;

      if (!username || !password) {
        errorEl.textContent = 'Please enter a username and password.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      errorEl.textContent = '';

      try {
        // Exchange credentials for a JWT via the OAuth2 password flow.
        // Content-Type is set implicitly by URLSearchParams to
        // application/x-www-form-urlencoded — do not override it manually.
        const res = await fetch('/token', {
          method: 'POST',
          body: new URLSearchParams({ username, password }),
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.detail || 'Login failed. Check your credentials.');
        }

        const data = await res.json();
        accessToken = data.access_token;

        // Fetch the user's profile to display role in header and controls
        const meRes = await authFetch('/api/me');
        if (meRes.ok) {
          const me = await meRes.json();
          $('user-badge').innerHTML =
            `<span>${me.username}</span>&nbsp;(${me.role})&nbsp;·&nbsp;`;
          $('user-badge').style.display = 'inline';

          // Show the role next to the controls header so it's clear who
          // is permitted to send commands (Commander only)
          $('ctrl-role-badge').textContent =
            me.role === 'commander' ? '🟢 Commander access' : '🔴 Viewer — read only';
        }

        $('login-overlay').classList.add('hidden');
        startDashboard();

      } catch (err) {
        errorEl.textContent = err.message;
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    $('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });

    // ── Robot position state ───────────────────────────────────────────────
    //
    // robotPos is updated on every successful status poll.  The movement
    // functions read from it to calculate the next target coordinates before
    // sending a move command.  Using the server-confirmed position (rather
    // than a locally tracked shadow) prevents drift if a move is rejected.
    let robotPos = null;  // { x, y } or null
    let mapGrid  = null;  // 2-D array from /api/map, or null

    // ── Controls — loading guard ───────────────────────────────────────────
    //
    // While a move or reset request is in-flight we disable all control
    // buttons to prevent queuing multiple commands simultaneously.
    const CTRL_IDS = ['btn-up', 'btn-down', 'btn-left', 'btn-right', 'btn-reset'];

    function setControlsDisabled(disabled) {
      CTRL_IDS.forEach(id => { $(id).disabled = disabled; });
    }

    function setCtrlStatus(msg, cls = '') {
      const el = $('ctrl-status');
      el.textContent = msg;
      el.className = cls;
    }

    // ── Move command ───────────────────────────────────────────────────────
    //
    // Called by each directional button with a delta (dx, dy).
    // Movement is relative — we add the delta to the current position to
    // produce absolute target coordinates required by POST /api/move.
    //
    // Coordinate system (matches the simulator):
    //   x increases to the right   (Left: dx = -1, Right: dx = +1)
    //   y increases downward        (Up:   dy = -1, Down:  dy = +1)
    //
    // Grid bounds: 0 ≤ x ≤ 20, 0 ≤ y ≤ 20
    async function move(dx, dy) {
      // Guard: we need a known position before we can calculate the target
      if (!robotPos) {
        setCtrlStatus('Position unknown — wait for telemetry.', 'error');
        return;
      }

      // ── Bounds checking ────────────────────────────────────────────────
      // Calculate the target and reject the move before sending any request
      // if it would take the robot outside the valid grid area.
      const targetX = robotPos.x + dx;
      const targetY = robotPos.y + dy;

      if (targetX < 0 || targetX > 20 || targetY < 0 || targetY > 20) {
        setCtrlStatus(`Out of bounds: (${targetX}, ${targetY}) — move cancelled.`, 'error');
        return;
      }

      // ── Send the authenticated move command ────────────────────────────
      // POST /api/move requires a JSON body with absolute coordinates.
      // authFetch injects the Authorization: Bearer header automatically.
      setControlsDisabled(true);
      setCtrlStatus('Sending move command…');

      try {
        const res = await authFetch('/api/move', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ x: targetX, y: targetY }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          // 403 = Viewer trying to move; 503 = robot unreachable
          throw new Error(err.detail || `HTTP ${res.status}`);
        }

        setCtrlStatus(`Moved to (${targetX}, ${targetY})`, 'ok');

        // ── Refresh telemetry and map after a successful move ──────────
        // Immediately re-poll status so the position card and map dot
        // update without waiting for the next scheduled interval.
        await pollStatus();
        await fetchMap();

      } catch (err) {
        setCtrlStatus(`Move failed: ${err.message}`, 'error');
      } finally {
        // Re-enable controls whether the request succeeded or failed
        setControlsDisabled(false);
      }
    }

    // ── Reset command ──────────────────────────────────────────────────────
    //
    // POST /api/reset sends no body.  After a successful reset we refresh
    // both status and map so the dashboard reflects the robot's home position.
    async function resetRobot() {
      setControlsDisabled(true);
      setCtrlStatus('Sending reset command…');

      try {
        // authFetch injects the Authorization: Bearer header automatically
        const res = await authFetch('/api/reset', { method: 'POST' });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }

        setCtrlStatus('Robot reset to home position.', 'ok');

        // Refresh telemetry and map to reflect the new home position
        await pollStatus();
        await fetchMap();

      } catch (err) {
        setCtrlStatus(`Reset failed: ${err.message}`, 'error');
      } finally {
        setControlsDisabled(false);
      }
    }

    // ── Status polling ─────────────────────────────────────────────────────
    async function pollStatus() {
      try {
        // authFetch injects Authorization: Bearer <token> automatically
        const r = await authFetch('/api/status');
        if (!r.ok) throw new Error(r.statusText);
        const d = await r.json();

        $('conn-dot').className = 'conn-indicator ok';
        $('conn-label').textContent = 'Connected';

        $('robot-id').textContent = d.id ?? '—';
        $('pos').textContent = d.position ? `(${d.position.x}, ${d.position.y})` : '—';
        $('robot-status').textContent = d.status ?? '—';

        if (d.battery !== undefined) {
          $('battery').textContent = `${d.battery.toFixed(1)}%`;
          const card = $('card-battery');
          card.className = 'stat-card' +
            (d.battery < 20 ? ' danger' : d.battery < 40 ? ' warn' : '');
        }

        // Update the shared robotPos state so move() always has current
        // coordinates to calculate from, and re-render the map dot.
        if (d.position) {
          robotPos = { x: d.position.x, y: d.position.y };
          if (mapGrid) renderMap(mapGrid);
        }

      } catch {
        $('conn-dot').className = 'conn-indicator error';
        $('conn-label').textContent = 'Unreachable';
      }
    }

    // ── Map fetch ──────────────────────────────────────────────────────────
    async function fetchMap() {
      const badge = $('map-badge');
      try {
        // authFetch injects Authorization: Bearer <token> automatically
        const r = await authFetch('/api/map');
        if (!r.ok) throw new Error(r.statusText);
        const data = await r.json();

        /*
         * The simulator returns the map in a "grid" field.
         * Each element is a row (array of integers):
         *   0 = empty traversable cell
         *   1 = obstacle / wall
         */
        const grid = data.grid ?? null;
        if (!Array.isArray(grid)) throw new Error('Unexpected map format');

        mapGrid = grid;
        badge.className   = 'map-badge ok';
        badge.textContent = `${grid.length}×${grid[0].length}`;
        renderMap(grid);

      } catch (err) {
        badge.className   = 'map-badge error';
        badge.textContent = 'Map unavailable';
        console.warn('Map fetch failed:', err);
      }
    }

    // ── Grid builder — called once when map data first arrives ─────────────
    const cellEls = [];  // flat array: cellEls[row * cols + col]

    function buildGrid(rows, cols) {
      const grid = $('robot-grid');
      grid.innerHTML = '';
      cellEls.length = 0;

      grid.style.setProperty('--cols', cols);
      grid.style.setProperty('--rows', rows);

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.dataset.row = row;
          cell.dataset.col = col;
          grid.appendChild(cell);
          cellEls.push(cell);
        }
      }

      $('map-axis').textContent = `X: 0 → ${cols - 1}   |   Y: 0 → ${rows - 1}`;
    }

    // ── Map renderer — called on every map fetch AND every status poll ─────
    function renderMap(grid) {
      const rows = grid.length;
      const cols = grid[0].length;

      if (cellEls.length !== rows * cols) buildGrid(rows, cols);

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const cell  = cellEls[row * cols + col];
          const value = grid[row][col];

          // robotPos.x → column index; robotPos.y → row index
          const isRobot = robotPos && robotPos.x === col && robotPos.y === row;

          if (isRobot) {
            cell.className = 'cell robot';
          } else if (value === 1) {
            cell.className = 'cell obstacle';
          } else {
            cell.className = 'cell empty';
          }

          cell.title = isRobot
            ? `Robot at (${col}, ${row})`
            : value === 1
              ? `Obstacle at (${col}, ${row})`
              : `Empty cell at (${col}, ${row})`;
        }
      }
    }

    // ── Dashboard startup — called once after successful login ─────────────
    function startDashboard() {
      pollStatus();
      fetchMap();
      setInterval(pollStatus, 3000);
      setInterval(fetchMap, 10000);
    }
  </script>
